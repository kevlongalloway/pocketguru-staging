<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#7c3aed" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#0ea5e9" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="lotus" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
  </defs>
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>
  <circle cx="256" cy="220" r="140" fill="url(#glow)"/>
  <!-- Lotus petals -->
  <ellipse cx="256" cy="180" rx="30" ry="60" fill="url(#lotus)" opacity="0.9" transform="rotate(0 256 256)"/>
  <ellipse cx="256" cy="180" rx="30" ry="60" fill="url(#lotus)" opacity="0.75" transform="rotate(45 256 256)"/>
  <ellipse cx="256" cy="180" rx="30" ry="60" fill="url(#lotus)" opacity="0.75" transform="rotate(90 256 256)"/>
  <ellipse cx="256" cy="180" rx="30" ry="60" fill="url(#lotus)" opacity="0.75" transform="rotate(135 256 256)"/>
  <ellipse cx="256" cy="180" rx="30" ry="60" fill="url(#lotus)" opacity="0.75" transform="rotate(180 256 256)"/>
  <ellipse cx="256" cy="180" rx="30" ry="60" fill="url(#lotus)" opacity="0.75" transform="rotate(225 256 256)"/>
  <ellipse cx="256" cy="180" rx="30" ry="60" fill="url(#lotus)" opacity="0.75" transform="rotate(270 256 256)"/>
  <ellipse cx="256" cy="180" rx="30" ry="60" fill="url(#lotus)" opacity="0.75" transform="rotate(315 256 256)"/>
  <!-- Center -->
  <circle cx="256" cy="256" r="28" fill="#f8fafc" opacity="0.95"/>
  <circle cx="256" cy="256" r="16" fill="url(#lotus)"/>
  <!-- Stars -->
  <circle cx="120" cy="120" r="3" fill="white" opacity="0.6"/>
  <circle cx="390" cy="100" r="2" fill="white" opacity="0.5"/>
  <circle cx="80" cy="350" r="2" fill="white" opacity="0.4"/>
  <circle cx="420" cy="380" r="3" fill="white" opacity="0.5"/>
  <circle cx="160" cy="420" r="2" fill="white" opacity="0.3"/>
  <circle cx="370" cy="440" r="2" fill="white" opacity="0.4"/>
</svg>
