name: Deploy to Server

# To retarget a new server (Rumble Cloud, DigitalOcean, etc.), just update
# these 3 secrets in GitHub → Settings → Secrets and variables → Actions:
#
#   SSH_PRIVATE_KEY  — private key that can SSH into the server
#   SSH_HOST         — server IP address
#   SSH_USER         — SSH user (usually: root)

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          chmod 644 ~/.ssh/known_hosts

      - name: Pull latest code on server
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} \
            "cd ~/pocketguru-staging && git pull origin master"

      - name: Install packages & refresh caches
        run: |
          ssh ${{ secrets.SSH_USER }}@${{ secrets.SSH_HOST }} "
            cd ~/pocketguru-staging
            docker compose exec -T php composer install --no-dev --optimize-autoloader --quiet
            docker compose exec -T php php artisan migrate --force
            docker compose exec -T php php artisan config:cache
            docker compose exec -T php php artisan route:cache
            docker compose exec -T php php artisan view:cache
            docker compose restart nginx
          "
